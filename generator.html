<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neumorphism Pro Generator</title>

<style>
:root{
  --bg:#e0e5ec;
  --light:#ffffff;
  --dark:#a3b1c6;
  --text:#333;
  --panel:#f4f6fb;

  --radius:18px;
  --distance:10px;
  --blur:20px;

  --primary:#4f46e5;
}

body{
  margin:0;
  display:flex;
  font-family:Inter,Arial;
  background:var(--bg);
  color:var(--text);
}

/* 🌙 Dark */
body.dark{
  --bg:#1e1e2f;
  --text:#fff;
  --panel:#2a2a3d;
  --light:#2f2f45;
  --dark:#12121a;
}

/* ===== 拟态 ===== */
.neu{
  border-radius:var(--radius);
  background:var(--bg);
  box-shadow:
    var(--distance) var(--distance) var(--blur) var(--dark),
    calc(-1*var(--distance)) calc(-1*var(--distance)) var(--blur) var(--light);
}

/* 按钮 */
.neu-btn{
  height:46px;
  border:none;
  cursor:pointer;
  transition:.2s;
  font-weight:500;
}
.neu-btn:hover{transform:translateY(-2px);}
.neu-btn:active{
  box-shadow:
    inset var(--distance) var(--distance) var(--blur) var(--dark),
    inset calc(-1*var(--distance)) calc(-1*var(--distance)) var(--blur) var(--light);
}

/* Sidebar */
.panel{
  width:320px;
  padding:20px;
  background:var(--panel);
  display:flex;
  flex-direction:column;
  gap:20px;
  overflow:auto;
}

.group{
  padding:15px;
}

.group-title{
  font-weight:600;
  margin-bottom:10px;
}

.option{
  display:flex;
  gap:10px;
  padding:6px 0;
}

/* Canvas */
.canvas{
  flex:1;
  padding:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:24px;
}

/* 修复 dark */
.canvas,.canvas *{
  color:var(--text);
}

/* 模块 */
.module{
  padding:20px;
  min-height:160px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;

  transition:.3s;
}

/* Hover Demo */
.module:hover{
  transform:scale(1.03);
}

/* input true neu */
.input{
  height:36px;
  border:none;
  padding:0 10px;
  background:var(--bg);
  border-radius:var(--radius);
  box-shadow:
    inset 6px 6px 10px var(--dark),
    inset -6px -6px 10px var(--light);
}

/* Toast */
.toast-wrap{
  position:fixed;
  bottom:20px;
  right:20px;
}
.toast{
  padding:12px 18px;
  background:#333;
  color:#fff;
  border-radius:10px;
  margin-top:10px;
  animation:fade .3s;
}
@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="panel">

<button class="neu neu-btn" onclick="back()">← Back</button>

<!-- 分类（完整保留） -->
<div class="group neu">
<div class="group-title">🧩 Form</div>
<label class="option"><input type="checkbox" value="login"> Login</label>
<label class="option"><input type="checkbox" value="register"> Register</label>
<label class="option"><input type="checkbox" value="search"> Search</label>
</div>

<div class="group neu">
<div class="group-title">📐 Layout</div>
<label class="option"><input type="checkbox" value="navbar"> Navbar</label>
<label class="option"><input type="checkbox" value="sidebar"> Sidebar</label>
</div>

<div class="group neu">
<div class="group-title">💰 Business</div>
<label class="option"><input type="checkbox" value="pricing"> Pricing</label>
<label class="option"><input type="checkbox" value="card"> Card</label>
</div>

<div class="group neu">
<div class="group-title">💬 Feedback</div>
<label class="option"><input type="checkbox" value="modal"> Modal</label>
<label class="option"><input type="checkbox" value="toast"> Toast</label>
</div>

<!-- 原功能：Style -->
<div class="group neu">
<div class="group-title">🎛 Style</div>
Radius <input type="range" min="5" max="40" value="18" oninput="setVar('--radius',this.value+'px')"><br>
Distance <input type="range" min="5" max="25" value="10" oninput="setVar('--distance',this.value+'px')"><br>
Blur <input type="range" min="5" max="40" value="20" oninput="setVar('--blur',this.value+'px')">
</div>

<!-- 原功能：Theme -->
<div class="group neu">
<div class="group-title">🎨 Theme</div>
<button class="neu neu-btn" onclick="setTheme('light')">Light</button>
<button class="neu neu-btn" onclick="setTheme('dark')">Dark</button>

<!-- 新增（不覆盖） -->
<button class="neu neu-btn" onclick="proTheme('blue')">Pro Blue</button>
<button class="neu neu-btn" onclick="proTheme('purple')">Pro Purple</button>
<button class="neu neu-btn" onclick="proTheme('neon')">Pro Neon</button>
</div>

<!-- 新增 Export（不影响原功能） -->
<div class="group neu">
<div class="group-title">⚡ Export</div>
<button class="neu neu-btn" onclick="setMode('html')">HTML</button>
<button class="neu neu-btn" onclick="setMode('react')">React</button>
<button class="neu neu-btn" onclick="setMode('tailwind')">Tailwind</button>
</div>

<!-- 操作 -->
<div class="group neu">
<button class="neu neu-btn" onclick="generate()">Generate UI</button>
<button class="neu neu-btn" onclick="copy()">Copy HTML</button>
</div>

</div>

<!-- Canvas -->
<div class="canvas" id="canvas"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>

let mode="html";

/* 组件（完整保留 + 扩展） */
const C={
login:{
html:`<div class="module neu"><h3>Login</h3><input class="input"><input class="input"><button class="neu neu-btn" data-a="login">Login</button></div>`
},
register:{
html:`<div class="module neu"><h3>Register</h3><input class="input"><input class="input"><button class="neu neu-btn" data-a="register">Register</button></div>`
},
search:{
html:`<div class="module neu"><input class="input"><button class="neu neu-btn" data-a="search">Search</button></div>`
},
navbar:{html:`<div class="module neu">Navbar</div>`},
sidebar:{html:`<div class="module neu">Sidebar</div>`},
pricing:{html:`<div class="module neu"><h3>$9</h3><button class="neu neu-btn">Buy</button></div>`},
card:{html:`<div class="module neu">Card</div>`},
modal:{html:`<div class="module neu"><button class="neu neu-btn">Open Modal</button></div>`},
toast:{html:`<div class="module neu"><button class="neu neu-btn">Toast</button></div>`}
};

function generate(){
  canvas.innerHTML='';
  document.querySelectorAll("input:checked").forEach(i=>{
    const d=document.createElement("div");
    d.innerHTML=C[i.value].html;
    canvas.appendChild(d.firstElementChild);
  });
}

function setVar(k,v){document.documentElement.style.setProperty(k,v);}
function setTheme(t){document.body.className=t==='dark'?'dark':'';}

function proTheme(t){
  if(t==="blue") document.documentElement.style.setProperty('--bg','#dbeafe');
  if(t==="purple") document.documentElement.style.setProperty('--bg','#ede9fe');
  if(t==="neon") document.documentElement.style.setProperty('--bg','#0f172a');
}

function setMode(m){
  mode=m;
  toast("Export mode: "+m);
}

function toast(msg){
  const t=document.createElement('div');
  t.className='toast';
  t.innerText=msg;
  toastWrap.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function copy(){
  navigator.clipboard.writeText(canvas.innerHTML);
  toast("Copied successfully");
}

document.addEventListener("click",e=>{
  const a=e.target.dataset.a;
  if(!a)return;
  toast(a+" success");
});

function back(){location.href="index.html";}
</script>

</body>
</html>
